version: 0.0
os: linux

files:
  - source: app/
    destination: /opt/app/
  - source: scripts/
    destination: /opt/deploy-scripts/

permissions:
  - object: /opt/app
    pattern: "**"
    owner: ec2-user
    group: ec2-user
  - object: /opt/deploy-scripts
    pattern: "**"
    owner: ec2-user
    group: ec2-user
    mode: "755"

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 120
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 180
      runas: root
  ApplicationStart:
    - location: scripts/start_app.sh
      timeout: 60
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: ec2-user
